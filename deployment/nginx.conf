server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    root /opt/journal/frontend/dist;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~ ^/(auth|users|authors|reviewers|papers|reviews|publications|audit|statistics|certificates|events|content|notifications|storage|health|docs|openapi.json|redoc)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
